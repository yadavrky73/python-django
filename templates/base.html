<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hare Krishna – Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c;
      --dark: #1a1a2e;
      --cream: #f9f5ef;
      --accent: #e8572a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--dark);
    }

    /* ── NAV ── */
    nav.main-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav.main-nav .logo {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.4rem;
      letter-spacing: 2px;
      text-decoration: none;
    }
    nav.main-nav ul {
      display: flex;
      gap: 1.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    nav.main-nav ul li a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav.main-nav ul li a:hover { color: var(--gold); }

    /* ── HERO CAROUSEL ── */
    .hero-section {
      position: relative;
      height: 90vh;
      min-height: 500px;
      overflow: hidden;
    }
    .hero-section .carousel,
    .hero-section .carousel-inner,
    .hero-section .carousel-item {
      height: 100%;
    }
    .hero-section .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    .hero-section .carousel-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(26,26,46,0.80) 0%, rgba(26,26,46,0.20) 70%);
    }
    .hero-text {
      position: absolute;
      top: 50%;
      left: 5%;
      transform: translateY(-50%);
      z-index: 10;
      max-width: 520px;
    }
    .hero-text .tag {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }
    .hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: #fff;
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .hero-text p {
      color: #ddd;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .btn-gold {
      display: inline-block;
      padding: 0.7rem 1.8rem;
      background: var(--gold);
      color: var(--dark);
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      text-decoration: none;
      transition: background 0.2s;
      cursor: pointer;
    }
    .btn-gold:hover { background: #b8943d; color: var(--dark); }
    .btn-outline-white {
      display: inline-block;
      padding: 0.68rem 1.8rem;
      background: transparent;
      border: 1.5px solid #fff;
      color: #fff;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 2px;
      text-decoration: none;
      margin-left: 0.75rem;
      transition: background 0.2s;
      cursor: pointer;
    }
    .btn-outline-white:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* custom carousel controls */
    .carousel-control-prev,
    .carousel-control-next {
      width: 52px;
      height: 52px;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      opacity: 1;
    }
    .carousel-control-prev { left: 1.5rem; }
    .carousel-control-next { right: 1.5rem; }
    .carousel-control-prev:hover,
    .carousel-control-next:hover { background: rgba(255,255,255,0.30); }

    /* ── STATS ── */
    .stats-bar {
      background: var(--dark);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .stat-item {
      padding: 1.75rem 1rem;
      text-align: center;
      border-right: 0.5px solid rgba(255,255,255,0.08);
    }
    .stat-item:last-child { border-right: none; }
    .stat-item .num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--gold);
      display: block;
    }
    .stat-item .lbl {
      font-size: 0.72rem;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    /* ── SECTION HELPERS ── */
    .section-pad { padding: 5rem 2rem; }
    .overline {
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      color: var(--dark);
    }
    .section-title.light { color: #fff; }

    /* ── EVENT CARDS ── */
    .event-card {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      border: 0.5px solid #e0dbd3;
      height: 100%;
    }
    .event-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .event-card .card-body { padding: 1.25rem; }
    .event-card .card-tag {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .event-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--dark);
      margin-bottom: 0.5rem;
    }
    .event-card p {
      font-size: 0.85rem;
      color: #666;
      line-height: 1.6;
    }
    .event-card a.read-more {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .event-card a.read-more:hover { text-decoration: underline; }

    /* ── MISSION / DARK SECTION ── */
    .dark-section {
      background: var(--dark);
      padding: 5rem 2rem;
    }
    .feature-img img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      border-radius: 4px;
    }
    .feature-list { display: flex; flex-direction: column; gap: 1.75rem; }
    .feature-item { display: flex; gap: 1rem; align-items: flex-start; }
    .feature-icon {
      width: 44px;
      height: 44px;
      min-width: 44px;
      background: rgba(201,168,76,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .feature-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .feature-item h4 {
      font-size: 0.95rem;
      color: #fff;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }
    .feature-item p {
      font-size: 0.82rem;
      color: #999;
      line-height: 1.6;
    }

    /* ── TESTIMONIALS ── */
    .testimonials-section {
      background: #fff;
      padding: 5rem 2rem;
    }
    .testi-card {
      background: var(--cream);
      border-radius: 4px;
      padding: 1.5rem;
      border-left: 3px solid var(--gold);
      height: 100%;
    }
    .testi-text {
      font-size: 0.88rem;
      color: #555;
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 1rem;
    }
    .testi-author { display: flex; align-items: center; gap: 0.75rem; }
    .testi-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    .testi-name { font-size: 0.82rem; font-weight: 500; color: var(--dark); }
    .testi-role { font-size: 0.75rem; color: #999; }

    /* ── GALLERY ── */
    .gallery-section { padding: 5rem 2rem; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: 200px 200px;
      gap: 8px;
    }
    .gallery-grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
      transition: opacity 0.3s;
    }
    .gallery-grid img:hover { opacity: 0.85; }
    .gallery-grid .tall {
      grid-row: span 2;
    }

    /* ── CTA ── */
    .cta-section {
      background: var(--accent);
      padding: 4rem 2rem;
      text-align: center;
    }
    .cta-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #fff;
      margin-bottom: 0.75rem;
    }
    .cta-section p {
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }
    .btn-white {
      display: inline-block;
      padding: 0.7rem 2rem;
      background: #fff;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 2px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-white:hover { background: #f0f0f0; color: var(--accent); }

    /* ── FOOTER ── */
    footer.main-footer {
      background: var(--dark);
      padding: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    footer.main-footer p { color: #666; font-size: 0.8rem; margin: 0; }
    footer.main-footer .footer-links { display: flex; gap: 1.5rem; }
    footer.main-footer .footer-links a {
      color: #666;
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.2s;
    }
    footer.main-footer .footer-links a:hover { color: var(--gold); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; }
      .gallery-grid .tall { grid-row: span 1; }
      nav.main-nav ul { display: none; }
    }
  </style>
</head>
<body>

  <!-- ════════ NAV ════════ -->
  <nav class="main-nav">
    <a href="#" class="logo">HARE KRISHNA</a>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="about">About</a></li>
      <li><a href="#">Gallery</a></li>
      <li><a href="services">Events</a></li>
      <li><a href="contact">Contact</a></li>
    </ul>
  </nav>

  {% block body %}{% endblock body %}

  
  <!-- ════════ FOOTER ════════ -->
  <footer class="main-footer">
    <p>© 2025 Hare Krishna Community. All rights reserved.</p>
    <div class="footer-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Donate</a>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
